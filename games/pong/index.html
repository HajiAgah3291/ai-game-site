<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Game</title>
<style>
 body {
     background-color: #0F0F0F;
     color: white;
     font-family: Arial, Helvetica, sans-serif;
     display: flex;
     flex-direction: column;
     align-items: center;
     margin: 0;
     padding: 20px;
 }
 canvas {
     background-color: #000;
     display: block;
 }
 #score {
     font-size: 24px;
     margin-bottom: 10px;
 }
 .controls {
     margin-top: 10px;
 }
 button {
     background-color: #ff007f;
     color: white;
     border: none;
     padding: 10px 20px;
     margin: 5px;
     font-size: 16px;
     cursor: pointer;
 }
 button:hover {
     opacity: 0.8;
 }
 /* Mobile touch controls */
 .touch-controls {
     display: none;
     width: 100%;
     max-width: 600px;
     margin-top: 10px;
 }
 .touch-controls div {
     display: flex;
     justify-content: space-between;
 }
 .touch-btn {
     width: 48%;
     padding: 20px 0;
     font-size: 18px;
 }
 @media (max-width: 600px) {
     .touch-controls {
         display: block;
     }
 }
</style>
</head>
<body>
<div id="score">0 : 0</div>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<div class="controls">
    <button id="pauseBtn">Pause</button>
    <button id="menuBtn">Back to Menu</button>
</div>
<div class="touch-controls">
    <div>
        <button class="touch-btn" id="leftUp">Left Up</button>
        <button class="touch-btn" id="leftDown">Left Down</button>
    </div>
    <div>
        <button class="touch-btn" id="rightUp">Right Up</button>
        <button class="touch-btn" id="rightDown">Right Down</button>
    </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const pauseBtn = document.getElementById('pauseBtn');
const menuBtn = document.getElementById('menuBtn');
const touch = {
    leftUp: document.getElementById('leftUp'),
    leftDown: document.getElementById('leftDown'),
    rightUp: document.getElementById('rightUp'),
    rightDown: document.getElementById('rightDown')
};

const paddleWidth = 10, paddleHeight = 80, paddleSpeed = 6;
const ballSize = 10;
let leftY = (canvas.height - paddleHeight) / 2;
let rightY = (canvas.height - paddleHeight) / 2;
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballVX = 4, ballVY = 4;
let leftScore = 0, rightScore = 0;
let paused = false;

const keys = {};

document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p') togglePause();
});

document.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
});

function togglePause() {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
}

pauseBtn.addEventListener('click', togglePause);
menuBtn.addEventListener('click', () => {
    window.location.href = '../index.html';
});

// Touch controls
let touchInterval = {};
function startTouch(id, dir) {
    touchInterval[id] = setInterval(() => movePaddle(dir), 16);
}
function endTouch(id) {
    clearInterval(touchInterval[id]);
}
['leftUp','leftDown','rightUp','rightDown'].forEach(id => {
    const dir = id.includes('Up') ? -1 : 1;
    const side = id.includes('left') ? 'left' : 'right';
    touch[id].addEventListener('touchstart', e => { e.preventDefault(); startTouch(id, {side, dir}); });
    touch[id].addEventListener('touchend', e => { endTouch(id); });
});

function movePaddle({side, dir}) {
    if (side === 'left') {
        leftY += dir * paddleSpeed;
        leftY = Math.max(0, Math.min(canvas.height - paddleHeight, leftY));
    } else {
        rightY += dir * paddleSpeed;
        rightY = Math.max(0, Math.min(canvas.height - paddleHeight, rightY));
    }
}

function update() {
    if (paused) return;
    // keyboard movement
    if (keys['w']) leftY -= paddleSpeed;
    if (keys['s']) leftY += paddleSpeed;
    if (keys['arrowup']) rightY -= paddleSpeed;
    if (keys['arrowdown']) rightY += paddleSpeed;

    leftY = Math.max(0, Math.min(canvas.height - paddleHeight, leftY));
    rightY = Math.max(0, Math.min(canvas.height - paddleHeight, rightY));

    ballX += ballVX;
    ballY += ballVY;

    if (ballY <= 0 || ballY + ballSize >= canvas.height) {
        ballVY *= -1;
    }

    // paddle collision
    if (ballX <= paddleWidth && ballY + ballSize >= leftY && ballY <= leftY + paddleHeight) {
        ballVX *= -1;
        ballX = paddleWidth;
    } else if (ballX + ballSize >= canvas.width - paddleWidth && ballY + ballSize >= rightY && ballY <= rightY + paddleHeight) {
        ballVX *= -1;
        ballX = canvas.width - paddleWidth - ballSize;
    }

    // scoring
    if (ballX < 0) {
        rightScore++;
        resetBall(-1);
    } else if (ballX > canvas.width) {
        leftScore++;
        resetBall(1);
    }

    draw();
    requestAnimationFrame(update);
}

function resetBall(direction) {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballVX = 4 * direction;
    ballVY = 4 * (Math.random() > 0.5 ? 1 : -1);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    // paddles
    ctx.fillRect(0, leftY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, rightY, paddleWidth, paddleHeight);
    // ball
    ctx.fillRect(ballX, ballY, ballSize, ballSize);
    scoreEl.textContent = `${leftScore} : ${rightScore}`;
}

update();
</script>
</body>
</html>
